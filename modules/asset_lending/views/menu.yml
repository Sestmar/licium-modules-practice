# 2. MENÚS VISUALES
# Menú Padre (Raíz)
- model: ui.menuitem
  ext_id: asset_lending_menu_root
  fields:
    title: "Assets"   
    icon: "mdi-laptop"
    sequence: 50

# Submenús
- model: ui.menuitem
  ext_id: asset_lending_menu_asset
  fields:
    title: "Recursos"  
    parent_id.ext_id: asset_lending_menu_root
    action_id.ext_id: asset_lending_action_asset
    sequence: 10

- model: ui.menuitem
  ext_id: asset_lending_menu_loan
  fields:
    title: "Préstamos" 
    parent_id.ext_id: asset_lending_menu_root
    action_id.ext_id: asset_lending_action_loan
    sequence: 20

- model: ui.menuitem
  ext_id: asset_lending_menu_location
  fields:
    title: "Ubicaciones" 
    parent_id.ext_id: asset_lending_menu_root
    action_id.ext_id: asset_lending_action_location
    sequence: 30