ui.action:
  # Acciones que enlazan los menús con los modelos
  - ext_id: action_community_events_event
    name: Eventos
    model_name: community_events.event
    view_mode: list,form

  - ext_id: action_community_events_session
    name: Sesiones
    model_name: community_events.session
    view_mode: list,form

  - ext_id: action_community_events_registration
    name: Inscripciones
    model_name: community_events.registration
    view_mode: list,form

ui.view:
  # ==========================================
  # VISTA FORMULARIO: EVENTO (Con ButtonBox y Flujo de Estados)
  # ==========================================
  - ext_id: view_event_form
    model_name: community_events.event
    type: form
    arch: |
      <form>
        <header>
          <button name="publish_event" type="action" state="draft" color="primary"/>
          <button name="close_registration" type="action" state="published" color="warning"/>
          <button name="cancel_event" type="action" state="published,closed" color="error"/>
          <button name="reopen_event" type="action" state="closed,cancelled" color="info"/>
          <field name="status" widget="statusbar"/>
        </header>
        <sheet>
          <div class="buttonbox">
            <button type="action" icon="mdi-account-group" name="action_community_events_registration">
              <field name="capacity_total" widget="statinfo" string="Aforo Total"/>
            </button>
          </div>
          <group>
            <group>
              <field name="title"/>
              <field name="slug"/>
              <field name="organizer_user_id"/>
              <field name="is_public"/>
            </group>
            <group>
              <field name="start_at"/>
              <field name="end_at"/>
              <field name="capacity_total"/>
              <field name="location"/>
            </group>
          </group>
          <notebook>
            <page string="Descripción">
              <field name="summary"/>
              <field name="description"/>
            </page>
          </notebook>
        </sheet>
      </form>

  # ==========================================
  # VISTA LISTA: INSCRIPCIONES (Con Bulk Action y Row Actions)
  # ==========================================
  - ext_id: view_registration_list
    model_name: community_events.registration
    type: list
    arch: |
      <list>
        <header>
          <button name="bulk_checkin" type="action" color="primary"/>
        </header>
        <field name="event_id"/>
        <field name="attendee_name"/>
        <field name="attendee_email"/>
        <field name="status" widget="badge"/>
        <field name="checkin_at"/>
        <button name="confirm" type="action" icon="mdi-check-circle" title="Confirmar"/>
        <button name="move_waitlist" type="action" icon="mdi-clock-outline" title="A Lista Espera"/>
        <button name="checkin" type="action" icon="mdi-map-marker-check" title="Check-in"/>
      </list>